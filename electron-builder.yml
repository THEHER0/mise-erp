appId: com.mise.erp
productName: Mise ERP
copyright: Copyright © 2026 Mise Software

directories:
  output: dist-electron
  buildResources: assets

files:
  - main.js
  - preload.js
  - dist/**
  - node_modules/**

# ─── macOS ────────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.business
  icon: assets/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist
  # Signing: set APPLE_IDENTITY env var to your certificate name, e.g.:
  #   export APPLE_IDENTITY="Developer ID Application: Jeff Whoever (ABC12345XY)"
  # Or leave unset to build unsigned (for local testing only).
  identity: ${env.APPLE_IDENTITY}

  # Notarization: set APPLE_TEAM_ID env var (10-char code from developer.apple.com)
  notarize:
    teamId: ${env.APPLE_TEAM_ID}

dmg:
  title: Mise ERP ${version}
  icon: assets/icon.icns
  window:
    width: 540
    height: 380
  contents:
    - x: 130
      y: 190
      type: file
    - x: 410
      y: 190
      type: link
      path: /Applications
  background: null

# ─── Auto-update ──────────────────────────────────────────────────────────────
publish:
  provider: github
  owner: THEHER0
  repo: mise-erp
  private: false
